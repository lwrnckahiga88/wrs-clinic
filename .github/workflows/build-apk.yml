name: Build WRS Clinic APK

# Runs the Capacitor Android build on GitHub's runner, which has a full
# Android SDK + Gradle already installed — this sidesteps needing that
# toolchain on Termux/the phone itself, which is the hard part on-device.
#
# Repo root IS the frontend project (package.json, capacitor.config.ts,
# android/ all live at top level) — no working-directory prefix needed.
on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install web dependencies
      run: npm install
      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wrs-clinic-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
